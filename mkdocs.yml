site_name: "Gen AI Notes"
site_url: https://yxshkm-notes.github.io/genai-notes/
repo_url: https://github.com/yxshkm-notes/genai-notes
repo_name: GitHub
theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
